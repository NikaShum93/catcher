<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🦄 Magic Editor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link id="gf" rel="stylesheet" href="">

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.1);
      --glass-strong: rgba(255, 255, 255, 0.2);
      --border: rgba(255, 255, 255, 0.3);
      --neon-pink: #ff00ff;
      --neon-cyan: #00ffff;
      --text: #ffffff;
      --text-soft: rgba(255,255,255,0.7);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      background: linear-gradient(135deg, #2e0249, #570a57, #a91079, #f806cc, #2e0249);
      background-size: 400% 400%;
      animation: dreamFlow 20s ease infinite;
      font-family: 'Quicksand', sans-serif;
      color: var(--text);
      height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    
    @keyframes dreamFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bubble {
      position: absolute; bottom: -100px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
    }

    header {
      background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      padding: 15px 30px; display: flex; align-items: center; justify-content: space-between;
      z-index: 10; box-shadow: 0 5px 30px rgba(0,0,0,0.2);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand h1 { 
      font-weight: 800; font-size: 22px; margin:0; 
      background: linear-gradient(to right, #fff, var(--neon-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px var(--neon-pink);
    }

    main { flex: 1; display: grid; grid-template-columns: 480px 1fr; gap: 0; overflow: hidden; z-index: 1; }
    .scroll-col { overflow-y: auto; padding: 30px; padding-bottom: 150px; border-right: 1px solid var(--border); background: rgba(0,0,0,0.1); }
    .sticky-col { overflow-y: auto; padding: 30px; background: rgba(255,255,255,0.02); }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, var(--neon-pink), var(--neon-cyan)); border-radius: 10px; }

    .card {
      background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px;
      box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.3); transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 15px 50px rgba(0,255,255,0.15); border-color: var(--neon-cyan); }
    .card h2 { margin: 0 0 20px; font-size: 16px; color: var(--neon-cyan); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; text-shadow: 0 0 10px rgba(0,255,255,0.5); }

    label { display: block; font-size: 13px; font-weight: 700; color: var(--text-soft); margin-bottom: 8px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    
    input, select, textarea {
      width: 100%; background: rgba(0,0,0,0.3); border: 2px solid transparent; border-radius: 12px;
      padding: 12px 16px; font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: 600;
      color: #fff; transition: all 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255,0,255,0.4); background: rgba(0,0,0,0.5); }
    input[type="color"] { padding: 4px; height: 45px; cursor: pointer; }
    textarea { resize: vertical; min-height: 90px; }
    
    .check-row { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
    .check-row:hover { background: rgba(255,255,255,0.15); border-color: var(--neon-pink); }
    .check-row input { width: auto; margin: 0; box-shadow:none; }
    .check-row label { margin: 0; cursor: pointer; color: #fff; }

    button {
      background: linear-gradient(90deg, #ff00cc, #3333ff); color: #fff; border: none; padding: 14px 24px; border-radius: 16px;
      font-weight: 800; cursor: pointer; font-size: 15px; text-transform: uppercase; letter-spacing: 1px;
      box-shadow: 0 0 20px rgba(255, 0, 204, 0.4); transition: all 0.3s; width: 100%; position: relative; overflow: hidden;
    }
    button::after { content:''; position: absolute; top:0; left:-100%; width:100%; height:100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: 0.5s; }
    button:hover::after { left: 100%; }
    button:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(51, 51, 255, 0.6); }
    
    .btn-ghost { background: rgba(255,255,255,0.1); color: #fff; box-shadow: none; border: 1px solid var(--border); }
    .btn-ghost:hover { background: rgba(255,255,255,0.2); border-color: #fff; }
    .btn-danger { background: rgba(255, 50, 50, 0.3); border: 1px solid #ff3333; color: #ffadad; width: auto; padding: 6px 14px; font-size: 12px; }

    .preview-sticky-wrap { position: sticky; top: 0; z-index: 5; border: 2px solid var(--neon-cyan); background: rgba(0,0,0,0.6); box-shadow: 0 0 30px rgba(0,255,255,0.2); }
    .preview-stage {
      background-color: #1a1a2e; background-image: radial-gradient(#ffffff 1px, transparent 1px);
      background-size: 20px 20px; border-radius: 16px; height: 240px;
      display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; margin-top: 15px; border: 1px dashed rgba(255,255,255,0.3);
    }
    
    .preview-item { position: relative; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .preview-item .bg-layer { position: absolute; inset: 0; z-index: 0; background-size: cover !important; background-position: center !important; transition: opacity 0.2s; }
    .preview-item .content-layer { position: relative; z-index: 1; padding: 12px; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    
    .shape-rect .bg-layer { border-radius: 12px; } .shape-rounded .bg-layer { border-radius: 30px; } .shape-circle .bg-layer { border-radius: 50%; }
    .shape-diamond .bg-layer { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
    .shape-star .bg-layer { clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
    .fx-shadow .bg-layer { box-shadow: 0 10px 30px rgba(0,0,0,0.6); } .fx-glow .bg-layer { box-shadow: 0 0 20px var(--glow), inset 0 0 10px var(--glow); }

    .level { background: rgba(255, 255, 255, 0.07); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--neon-pink); }
    .level-header { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
    .level h3 { margin: 0; font-size: 16px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
    
    .hint { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 5px; }

    /* Modal for test drive */
    #previewModal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
    }
    #closePreview { position: absolute; top: 20px; right: 20px; width: auto; background: #ff3333; padding: 10px 20px; border-radius: 12px; }
  </style>
</head>
<body>

  <div class="bubbles" id="bubbles"></div>

  <div id="previewModal">
    <button id="closePreview">Закрыть игру</button>
    <iframe id="previewIframe" src="" style="width: 900px; height: 600px; border: 2px solid var(--neon-cyan); border-radius: 16px; background: #000;"></iframe>
  </div>

  <header>
    <div class="brand">
      <span style="font-size:28px">🦄</span>
      <h1>Magic Catcher</h1>
    </div>
    <button id="saveBtnTop" style="width: auto; padding: 10px 25px;">✨ Опубликовать</button>
  </header>

  <main>
    <div class="scroll-col">
      
      <div class="card">
        <h2><span>🎮</span> Геймплей</h2>
        <div class="row">
          <div><label>Язык</label><select id="language"></select></div>
          <div><label>Шрифт</label><select id="font"></select></div>
        </div>
        <div class="row">
          <div><label>Скорость (1–10)</label><input type="number" id="speed" value="3" min="1" max="10"></div>
          <div>
            <label>Направление</label>
            <select id="direction">
              <option value="down">⬇️ Сверху ВНИЗ</option>
              <option value="up">⬆️ Снизу ВВЕРХ</option>
              <option value="left">⬅️ Справа НАЛЕВО</option>
              <option value="right">➡️ Слева НАПРАВО</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card" style="border-color: var(--neon-pink);">
        <h2><span>🦸‍♂️</span> Герой</h2>
        <label>Картинка героя (URL)</label>
        <input type="url" id="playerImg" placeholder="https://.../unicorn.gif">
        <div class="hint">Если пусто — играем кликами (без героя).</div>
        
        <div class="row" style="margin-top:12px; align-items: center;">
            <div>
                <label>Размер героя (px): <span id="sizeVal">120</span></label>
                <input type="range" id="playerSize" value="120" min="50" max="300" oninput="document.getElementById('sizeVal').innerText = this.value">
            </div>
            <div class="check-row" style="margin-top: 10px;">
                <input type="checkbox" id="flipHero">
                <label for="flipHero">Отразить героя</label>
            </div>
        </div>
      </div>

      <div class="card">
        <h2><span>🎨</span> Вид элементов</h2>
        <div class="row">
          <div>
             <label>Форма</label>
             <select id="shape">
               <option value="rect">Квадрат</option>
               <option value="rounded" selected>Скругленный</option>
               <option value="circle">Круг</option>
               <option value="diamond">Ромб</option>
               <option value="star">Звезда</option>
             </select>
          </div>
          <div><label>Размер картинки (px)</label><input type="number" id="imgBox" value="160"></div>
        </div>

        <div class="row">
          <div><label>Цвет фона</label><input type="color" id="bgColor" value="#6366f1"></div>
          <div><label>Прозрачность фона</label><input type="range" id="opacity" value="1" step="0.1" min="0" max="1"></div>
        </div>
        
        <label>Фоновая картинка элемента (URL)</label>
        <textarea id="bgImages" style="min-height:60px" placeholder="https://..."></textarea>
        
        <div class="row" style="margin-top:12px">
           <div><label>Отступ внутри (px)</label><input type="number" id="pad" value="22"></div>
        </div>
      </div>

      <div class="card">
        <h2><span>✨</span> Магия и Эффекты</h2>
        <div class="row-3">
           <div class="check-row"><input type="checkbox" id="borderOn" checked><label for="borderOn">Рамка</label></div>
           <input type="color" id="borderColor" value="#ffffff" style="height:46px">
           <input type="number" id="borderWidth" value="2" placeholder="px">
        </div>

        <div class="row">
          <div class="check-row"><input type="checkbox" id="shadowOn" checked><label for="shadowOn">Тень</label></div>
          <div class="check-row"><input type="checkbox" id="fx3d"><label for="fx3d">3D Объем</label></div>
        </div>
        
        <div class="row" style="align-items:center">
           <div class="check-row"><input type="checkbox" id="glowOn"><label for="glowOn">Неон</label></div>
           <input type="color" id="glowColor" value="#ff00ff" style="height:46px">
        </div>
      </div>

      <div class="card">
        <h2><span>🔤</span> Текст</h2>
        <div class="row">
           <div><label>Цвет текста</label><input type="color" id="textColor" value="#ffffff"></div>
           <div><label>Размер (px)</label><input type="number" id="fontSize" value="28"></div>
        </div>
      </div>

      <div class="card">
        <h2><span>💬</span> Сообщения</h2>
        <div class="row">
          <div><label>Заголовок старта</label><input type="text" id="startTitle" placeholder="Magic Game!"></div>
          <div><label>Кнопка старта</label><input type="text" id="startBtnText" placeholder="Start"></div>
        </div>
        <label>Финал (Текст или Картинка)</label>
        <textarea id="finalFeedback" placeholder="You are amazing!"></textarea>
      </div>

    </div>

    <div class="sticky-col">
      
      <div class="card preview-sticky-wrap">
        <h2 style="font-size:12px; color:#aaa; margin-bottom:10px; border:none">ВНЕШНИЙ ВИД ЭЛЕМЕНТА</h2>
        <div class="row" style="margin-bottom:0; gap:8px">
           <input type="text" id="previewValue" value="Dream">
           <div style="display:flex; gap:4px">
             <button class="btn-ghost" id="btnText" style="width:auto; padding:0 12px">T</button>
             <button class="btn-ghost" id="btnImage" style="width:auto; padding:0 12px">🖼️</button>
           </div>
        </div>

        <div class="preview-stage">
          <div id="previewItem" class="preview-item shape-rounded fx-shadow" style="--glow:#ff00ff;">
            <div class="bg-layer"></div>
            <div class="content-layer">
               </div>
          </div>
        </div>
      </div>

      <div id="levels"></div>
      <button id="addLevel" class="btn-ghost" style="border: 2px dashed rgba(255,255,255,0.3); margin-bottom: 24px; color:#fff">➕ Добавить уровень</button>

      <div class="card" style="background:#0f172a; border-color:var(--neon-cyan)">
        <h2 style="color:var(--neon-cyan)">🚀 Публикация</h2>
        
        <button id="btnPreviewGame" class="btn-ghost" style="margin-bottom:12px; border-color:var(--neon-cyan); background:rgba(0,255,255,0.1);">🎮 Тест-драйв игры</button>
        
        <button id="saveBtn" style="margin-bottom:12px">💾 Сохранить Игру</button>
        <button id="copyBtn" class="btn-ghost" style="font-size:14px; margin-bottom:8px; display:none; border-color: #00ff00;">📋 Скопировать код</button>
      </div>

    </div>
  </main>

  <script>
    const $ = sel => document.querySelector(sel);
    const $$ = sel => document.querySelectorAll(sel);
    let generatedCode = "";
    let editorMjPromise = Promise.resolve();

    function createBubbles() {
      const container = document.getElementById('bubbles');
      for (let i = 0; i < 20; i++) {
        const b = document.createElement('div'); b.className = 'bubble';
        const size = Math.random() * 60 + 20; b.style.width = size + 'px'; b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + '%'; b.style.animationDuration = (Math.random() * 10 + 10) + 's';
        b.style.animationDelay = (Math.random() * 10) + 's'; container.appendChild(b);
      }
    }

    const FONT_MAP = {
      ru: ["Nunito", "Rubik", "Comfortaa", "Pacifico", "Lobster", "Caveat", "Amatic SC", "Russo One", "Press Start 2P", "Montserrat"],
      en: ["Nunito", "Quicksand", "Fredoka One", "Bangers", "Creepster", "Monoton", "Righteous", "Orbitron", "Sacramento", "Indie Flower"],
      ja: ["Dela Gothic One", "Kosugi Maru", "Kiwi Maru", "DotGothic16", "Noto Sans JP"],
      zh: ["ZCOOL KuaiLe", "Ma Shan Zheng", "ZCOOL QingKe HuangYou", "Noto Sans SC"],
      de: ["Fredoka One", "Patrick Hand", "Bangers", "Rubik", "Open Sans"],
      it: ["Lobster", "Montserrat", "Lato", "Playfair Display", "Patrick Hand"],
      es: ["Pacifico", "Amatic SC", "Montserrat", "Bangers", "Titan One"],
      fr: ["Parisienne", "Comfortaa", "Montserrat", "Patrick Hand", "Rubik"],
      math: ["Latin Modern Math", "Rubik"]
    };

    const LANG_NAMES = { ru: "Русский 🇷🇺", en: "English 🇬🇧", ja: "日本語 🇯🇵", zh: "中文 🇨🇳", de: "Deutsch 🇩🇪", it: "Italiano 🇮🇹", es: "Español 🇪🇸", fr: "Français 🇫🇷", math: "Math 📐" };

    function init(){
      createBubbles(); fillLanguageSelect(); fillFontsForLanguage('ru'); addLevel(); applyGoogleFont('Nunito'); updatePreview();
      
      $$('input, select, textarea').forEach(el => { el.oninput = updatePreview; el.onchange = updatePreview; });
      
      $('#btnText').onclick = () => { $('#previewItem').dataset.mode='text'; updatePreview(); };
      $('#btnImage').onclick = () => { $('#previewItem').dataset.mode='image'; updatePreview(); };
      $('#addLevel').onclick = addLevel;
      $('#saveBtn').onclick = publish;
      $('#saveBtnTop').onclick = publish;
      $('#language').onchange = (e) => { fillFontsForLanguage(e.target.value); updatePreview(); };
      $('#font').onchange = (e) => { applyGoogleFont(e.target.value); updatePreview(); };

      // Логика Тест-Драйва
      $('#btnPreviewGame').onclick = () => {
        const cfg = collectConfig();
        if(!cfg.levels.length || !cfg.levels[0].target) return alert("Добавь уровень для теста!");
        $('#previewModal').style.display = 'flex';
        const ifr = $('#previewIframe');
        ifr.src = `${BASE}?id=preview`; 
        window.onmessage = (e) => {
           if(e.data === 'previewReady') ifr.contentWindow.postMessage({cfg}, '*');
        };
      };

      $('#closePreview').onclick = () => {
        $('#previewModal').style.display = 'none';
        $('#previewIframe').src = ''; 
      };

      // Копирование кода
      $('#copyBtn').onclick = () => {
        if(generatedCode) {
          navigator.clipboard.writeText(generatedCode).then(() => {
             $('#copyBtn').textContent = '✅ Скопировано в буфер!';
             setTimeout(() => $('#copyBtn').textContent = '📋 Скопировать код', 2500);
          });
        }
      };
    }

    function fillLanguageSelect(){
      $('#language').innerHTML = Object.keys(FONT_MAP).map(k => `<option value="${k}">${LANG_NAMES[k]}</option>`).join('');
    }

    function fillFontsForLanguage(lang){
      const list = FONT_MAP[lang] || FONT_MAP.en;
      $('#font').innerHTML = list.map(f => `<option>${f}</option>`).join(''); $('#font').value = list[0];
    }

    function applyGoogleFont(fontName){
      $('#gf').href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/ /g,'+')}:wght@400;700&display=swap`;
      // Применяем шрифт к contentLayer, чтобы он подхватил любой текст внутри
      $('#previewItem').querySelector('.content-layer').style.fontFamily = `"${fontName}", system-ui`;
    }

    function updatePreview(){
      const item = $('#previewItem'); 
      const bgLayer = item.querySelector('.bg-layer'); 
      const contentLayer = item.querySelector('.content-layer');
      
      const val  = $('#previewValue').value.trim(); 
      const isImg = item.dataset.mode === 'image';

      item.className = `preview-item shape-${$('#shape').value}`;
      if($('#shadowOn').checked) item.classList.add('fx-shadow');
      if($('#fx3d').checked) item.classList.add('fx-3d');
      if($('#glowOn').checked) { item.classList.add('fx-glow'); item.style.setProperty('--glow', $('#glowColor').value); } else item.classList.remove('fx-glow');

      if($('#borderOn').checked) bgLayer.style.border = `${$('#borderWidth').value}px solid ${$('#borderColor').value}`; 
      else bgLayer.style.border = 'none';

      const bgList = ($('#bgImages').value||'').split('\n').filter(s=>s.trim().startsWith('http'));
      if(bgList.length){ bgLayer.style.backgroundImage = `url(${bgList[0]})`; bgLayer.style.backgroundColor = 'transparent'; } 
      else { bgLayer.style.backgroundImage = 'none'; bgLayer.style.backgroundColor = $('#bgColor').value; }
      bgLayer.style.opacity = $('#opacity').value;

      if(isImg || /^https?:\/\//i.test(val)){
        contentLayer.innerHTML = `<img src="${/^https?:\/\//i.test(val) ? val : 'https://via.placeholder.com/150'}" style="width:100%;height:100%;object-fit:contain; pointer-events:none;">`;
        const sz = $('#imgBox').value || 160; 
        item.style.width = sz+'px'; 
        item.style.height = sz+'px';
      } else {
        // Чтобы MathJax не кешировал элемент, мы удаляем старый и создаем НОВЫЙ каждый раз
        contentLayer.innerHTML = ''; 
        const newText = document.createElement('span');
        newText.id = 'previewText';
        newText.style.fontWeight = '700';
        newText.style.color = $('#textColor').value; 
        newText.style.fontSize = $('#fontSize').value + 'px'; 
        contentLayer.appendChild(newText); 
        
        // РЕНДЕР ФОРМУЛ В ПРЕДПРОСМОТРЕ
        if ($('#language').value === 'math') {
            newText.textContent = `\\(${val}\\)`;
            if(window.MathJax && window.MathJax.typesetPromise) {
                // Очищаем кеш MathJax для этого элемента перед рендером
                MathJax.typesetClear([newText]);
                editorMjPromise = editorMjPromise.then(() => MathJax.typesetPromise([newText])).catch(err => console.log(err));
            }
        } else {
            newText.textContent = val;
        }

        item.style.width = 'auto'; 
        item.style.height = 'auto'; 
        item.style.minWidth = '120px'; 
        item.style.minHeight = '80px';
      }
      contentLayer.style.padding = $('#pad').value + 'px';
    }

    function levelTemplate(i){
      const div = document.createElement('div'); div.className = 'level';
      div.innerHTML = `
        <div class="level-header"><h3>УРОВЕНЬ ${i+1}</h3><button class="btn-danger del">Удалить</button></div>
        <input type="text" class="target" placeholder="Цель (например: Past Simple)" style="margin-bottom:8px">
        <div class="row"><textarea class="correct" placeholder="Правильно..."></textarea><textarea class="wrong" placeholder="Неправильно..."></textarea></div>
        <label>Таймер (сек)</label><input type="number" class="timer" value="30" style="width:80px">`;
      div.querySelector('.del').onclick = () => div.remove(); return div;
    }

    function addLevel(){ $('#levels').appendChild(levelTemplate($$('#levels .level').length)); }

    function collectConfig(){
      const levels = [];
      $$('.level').forEach(l => {
        levels.push({
          target: l.querySelector('.target').value.trim(),
          correct: l.querySelector('.correct').value.split('\n').filter(s=>s.trim()),
          wrong: l.querySelector('.wrong').value.split('\n').filter(s=>s.trim()),
          timer: l.querySelector('.timer').value
        });
      });

      return {
        language: $('#language').value, font: $('#font').value, fontSize: $('#fontSize').value, textColor: $('#textColor').value, speed: $('#speed').value,
        style: {
          shape: $('#shape').value, pad: $('#pad').value, bgColor: $('#bgColor').value, bgImages: ($('#bgImages').value||'').split('\n').filter(s=>s.trim()),
          borderOn: $('#borderOn').checked, borderColor: $('#borderColor').value, borderWidth: $('#borderWidth').value, shadow: $('#shadowOn').checked,
          glow: $('#glowOn').checked, glowColor: $('#glowColor').value, fx3d: $('#fx3d').checked, opacity: $('#opacity').value, imgBox: $('#imgBox').value
        },
        player: { img: $('#playerImg').value.trim(), size: $('#playerSize').value, flipHero: $('#flipHero').checked },
        direction: $('#direction').value, start: { title: $('#startTitle').value, btnText: $('#startBtnText').value }, finalFeedback: $('#finalFeedback').value, levels: levels
      };
    }

    const ENDPOINT = "https://server-kjnn.onrender.com/publish";
    const KEY = "nika_read_pub_2025";
    const BASE = "https://nikashum93.github.io/catcher/main.html";

    async function publish(){
      const cfg = collectConfig();
      if(!cfg.levels.length || !cfg.levels[0].target) return alert("Добавь уровень!");
      
      const btn = $('#saveBtnTop'); const oldTxt = btn.textContent;
      btn.textContent = "⏳..."; btn.disabled = true;

      const id = (cfg.levels[0].target.replace(/[^a-z0-9]/gi,'-') + '-' + Date.now()).toLowerCase();
      
      try {
        const res = await fetch(ENDPOINT, { method:'POST', headers: {'Content-Type':'application/json', 'X-Publish-Key': KEY}, body: JSON.stringify({ id, mode:'json', folder:'data', content: JSON.stringify(cfg) }) });
        if(!res.ok) throw new Error();
        
        generatedCode = `<div style="position:relative; width:100%; padding-bottom:56.25%;"><script src="${BASE}?id=${id}"><\/script></div>`;
        $('#copyBtn').style.display = 'block';
        alert("✅ Игра успешно сохранена на сервере! Теперь можно скопировать код.");
      } catch(e) { alert("❌ Ошибка при публикации."); }
      btn.textContent = oldTxt; btn.disabled = false;
    }
    
    init();
  </script>
</body>
</html>
